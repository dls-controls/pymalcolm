# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Run tests and linter

# Trigger action for every push/PR
on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.7, 3.8, 3.9]

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Run info:
      run: |
        env
        pwd
        ifconfig
        IP=$(ip addr show docker0 | grep -Po 'inet \K[\d.]+')
        echo $IP
        # Fix docker0 broadcast address so p4p will work
        sudo ip addr del $IP/16 dev docker0
        sudo ip addr add $IP/16 broadcast + dev docker0
        ifconfig
        # ls -al ${VIRTUAL_ENV}/lib/python${TRAVIS_PYTHON_VERSION}/site-packages
        # ls -al ${VIRTUAL_ENV}/bin
    - name: Install dependencies
      run: |
        # Install pipenv
        python -m pip install --upgrade pipenv wheel
        # Skip lock as it contains hashes from the subset installed on DLS PyPI
        pipenv install --skip-lock --dev
        # ls -al ${VIRTUAL_ENV}/lib/python${TRAVIS_PYTHON_VERSION}/site-packages
        # ls -al ${VIRTUAL_ENV}/bin
        python setup.py bdist_wheel
    - name: Run flake8
      run: pipenv run flake8
    - name: Run tests
      run: pipenv run tests
    - name: Run docs
      run: pipenv run docs
    - name: Coverage
      run: codecov --token=0fc7b8ca-201c-4f0f-938b-ac26f79d26ed
